<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观AI - 3分钟止观练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page { display: none; flex: 1; flex-direction: column; }
        .page.active { display: flex; }
        .header { text-align: center; margin-bottom: 30px; }
        .greeting { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }
        .stats-card {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px 10px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .stat-item { text-align: center; }
        .stat-number {
            display: block;
            font-size: 32px;
            font-weight: 700;
            color: #4a9eff;
            margin-bottom: 4px;
        }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); }
        .main-action { margin-bottom: 30px; text-align: center; }
        .practice-btn {
            background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(74,158,255,0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: none;
            color: #fff;
        }
        .practice-btn:hover { transform: scale(1.05); }
        .btn-text { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .btn-subtext { font-size: 12px; color: rgba(255,255,255,0.8); }
        .selector { margin-bottom: 20px; }
        .selector-label {
            display: block;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .options { display: flex; gap: 10px; }
        .option {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option:hover, .option.active {
            background: rgba(74,158,255,0.15);
            border-color: #4a9eff;
        }
        .option-number { display: block; font-size: 24px; font-weight: 600; margin-bottom: 2px; }
        .option-unit { font-size: 11px; color: rgba(255,255,255,0.5); }
        .practice-page { position: relative; }
        .breath-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,158,255,0.1) 0%, transparent 70%);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .breath-bg.breathing {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.5; }
        }
        .practice-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            z-index: 1;
        }
        .back-btn { color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; padding: 10px; }
        .practice-info { flex: 1; text-align: center; }
        .practice-duration { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .practice-mode { font-size: 12px; color: rgba(255,255,255,0.5); }
        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        .timer {
            font-size: 72px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }
        .timer-label { font-size: 16px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }
        .audio-control {
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .guide-text {
            max-width: 320px;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
        }
        .progress-bar {
            width: 100%;
            max-width: 320px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #357abd);
            border-radius: 2px;
            transition: width 1s linear;
        }
        .progress-text { font-size: 12px; color: rgba(255,255,255,0.5); }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            z-index: 1;
        }
        .control-btn {
            padding: 15px 40px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .control-btn.start { background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%); color: #fff; }
        .control-btn.pause { background: rgba(255,193,7,0.9); color: #000; }
        .control-btn.end { background: rgba(244,67,54,0.9); color: #fff; }
        .completion-page { text-align: center; justify-content: center; }
        .completion-title { font-size: 36px; margin-bottom: 10px; }
        .completion-time { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
        .rating-section { margin-bottom: 30px; }
        .rating-label { display: block; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .stars { display: flex; justify-content: center; gap: 10px; }
        .star { font-size: 36px; color: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s ease; }
        .star:hover, .star.active { color: #ffc107; }
        .notes-input {
            width: 100%;
            max-width: 320px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            resize: none;
            margin-bottom: 30px;
        }
        .notes-input::placeholder { color: rgba(255,255,255,0.3); }
        .save-btn {
            background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
            color: #fff;
            padding: 15px 60px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .stats-page .header { margin-bottom: 20px; }
        .overview-card {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(135deg, rgba(74,158,255,0.2) 0%, rgba(53,122,189,0.1) 100%);
            border-radius: 16px;
            padding: 20px 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(74,158,255,0.2);
        }
        .overview-item { text-align: center; flex: 1; }
        .overview-number { display: block; font-size: 32px; font-weight: 700; color: #4a9eff; margin-bottom: 4px; }
        .overview-label { font-size: 12px; color: rgba(255,255,255,0.6); }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .history-main { display: flex; align-items: center; gap: 15px; }
        .history-date { text-align: center; min-width: 50px; }
        .date-day { font-size: 24px; font-weight: 600; color: #4a9eff; }
        .date-month { font-size: 11px; color: rgba(255,255,255,0.5); }
        .history-info { flex: 1; }
        .history-duration { font-size: 16px; margin-bottom: 2px; }
        .history-mode { font-size: 12px; color: rgba(255,255,255,0.5); }
        .history-rating { color: #ffc107; font-size: 14px; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 48px; margin-bottom: 15px; }
        .empty-text { font-size: 18px; margin-bottom: 8px; }
        .empty-subtext { font-size: 14px; color: rgba(255,255,255,0.5); }
        .tab-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-top: 20px;
        }
        .tab-item { text-align: center; cursor: pointer; padding: 10px 30px; border-radius: 12px; transition: all 0.3s ease; }
        .tab-item:hover, .tab-item.active { background: rgba(74,158,255,0.2); }
        .tab-icon { font-size: 20px; margin-bottom: 4px; }
        .tab-text { font-size: 12px; color: rgba(255,255,255,0.6); }
        .tab-item.active .tab-text { color: #4a9eff; }
    </style>
</head>
<body>
    <div class="container">
        <div id="homePage" class="page active">
            <div class="header">
                <div class="greeting" id="greeting">你好</div>
                <div class="subtitle">每日止观，回归当下</div>
            </div>
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-number" id="todayCount">0</span>
                    <span class="stat-label">今日练习</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="streak">0</span>
                    <span class="stat-label">连续天数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalMinutes">0</span>
                    <span class="stat-label">总分钟</span>
                </div>
            </div>
            <div class="main-action">
                <button class="practice-btn" onclick="startPractice()">
                    <span class="btn-text">开始止观</span>
                    <span class="btn-subtext" id="btnSubtext">3分钟 · 引导</span>
                </button>
            </div>
            <div class="selector">
                <span class="selector-label">选择时长</span>
                <div class="options">
                    <div class="option active" onclick="selectDuration(3)">
                        <span class="option-number">3</span>
                        <span class="option-unit">分钟</span>
                    </div>
                    <div class="option" onclick="selectDuration(5)">
                        <span class="option-number">5</span>
                        <span class="option-unit">分钟</span>
                    </div>
                    <div class="option" onclick="selectDuration(10)">
                        <span class="option-number">10</span>
                        <span class="option-unit">分钟</span>
                    </div>
                </div>
            </div>
            <div class="selector">
                <span class="selector-label">练习模式</span>
                <div class="options">
                    <div class="option active" onclick="selectMode('guided')">
                        <span class="option-number">引导</span>
                        <span class="option-unit">适合初学</span>
                    </div>
                    <div class="option" onclick="selectMode('silent')">
                        <span class="option-number">自主</span>
                        <span class="option-unit">适合熟练</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="practicePage" class="page practice-page">
            <div class="breath-bg" id="breathBg"></div>
            <div class="practice-header">
                <div class="back-btn" onclick="goBack()">← 返回</div>
                <div class="practice-info">
                    <div class="practice-duration" id="practiceDuration">3分钟止观</div>
                    <div class="practice-mode" id="practiceMode">引导练习</div>
                </div>
            </div>
            <div class="timer-section">
                <div class="timer" id="timer">03:00</div>
                <div class="timer-label" id="stageLabel">准备开始</div>
                <div class="audio-control" id="audioControl" onclick="toggleAudio()">🔔 提示音: 开</div>
                <div class="guide-text" id="guideText" style="display: none;">让身体自然放松，脊柱轻轻挺直</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div class="controls" id="practiceControls">
                <button class="control-btn start" onclick="startTimer()">开始练习</button>
            </div>
        </div>

        <div id="completionPage" class="page completion-page">
            <div class="completion-title">🎉 练习完成</div>
            <div class="completion-time" id="completionTime">实际练习 3 分钟</div>
            <div class="rating-section">
                <span class="rating-label">本次练习质量</span>
                <div class="stars" id="ratingStars">
                    <span class="star" onclick="setRating(1)">★</span>
                    <span class="star" onclick="setRating(2)">★</span>
                    <span class="star" onclick="setRating(3)">★</span>
                    <span class="star" onclick="setRating(4)">★</span>
                    <span class="star" onclick="setRating(5)">★</span>
                </div>
            </div>
            <textarea class="notes-input" id="practiceNotes" placeholder="记录这次练习的感受（可选）" maxlength="200"></textarea>
            <button class="save-btn" onclick="savePractice()">保存记录</button>
        </div>

        <div id="statsPage" class="page stats-page">
            <div class="header">
                <div class="greeting">修行记录</div>
                <div class="subtitle">见证你的成长</div>
            </div>
            <div class="overview-card">
                <div class="overview-item">
                    <span class="overview-number" id="totalSessions">0</span>
                    <span class="overview-label">总次数</span>
                </div>
                <div class="overview-item">
                    <span class="overview-number" id="totalHours">0</span>
                    <span class="overview-label">总小时</span>
                </div>
                <div class="overview-item">
                    <span class="overview-number" id="currentStreak">0</span>
                    <span class="overview-label">连续天</span>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <div class="empty-icon">🧘</div>
                    <div class="empty-text">还没有练习记录</div>
                    <div class="empty-subtext">开始你的第一次止观练习吧</div>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" onclick="showPage('home')" id="tabHome">
                <div class="tab-icon">🧘</div>
                <div class="tab-text">练习</div>
            </div>
            <div class="tab-item" onclick="showPage('stats')" id="tabStats">
                <div class="tab-icon">📊</div>
                <div class="tab-text">记录</div>
            </div>
        </div>
    </div>

    <script>
        let settings = { duration: 3, mode: 'guided' };
        let practiceHistory = JSON.parse(localStorage.getItem('zhiguan_history') || '[]');
        let currentPractice = { startTime: null, duration: 3, mode: 'guided', rating: 0, notes: '' };
        let timer = null, remainingTime = 180, totalTime = 180, isPlaying = false;
        let audioContext = null, audioEnabled = true, audioVolume = 1.0;
        let lastMinuteMark = 0;
        let preEndWarningPlayed = false;

        document.addEventListener('DOMContentLoaded', () => {
            setGreeting();
            updateHomeStats();
            updateStatsPage();
            initAudio();
        });

        function initAudio() {
            try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
            catch (e) { audioEnabled = false; }
        }

        // 磬声 - 浑厚悠扬如波荡漾
        function playBellSound(frequency = 528, duration = 3, type = 'sine') {
            if (!audioEnabled || !audioContext) return;
            
            const now = audioContext.currentTime;
            
            // 主音 - 使用triangle波形增加浑厚感
            const mainOsc = audioContext.createOscillator();
            const mainGain = audioContext.createGain();
            mainOsc.connect(mainGain);
            mainGain.connect(audioContext.destination);
            
            mainOsc.frequency.value = frequency;
            mainOsc.type = 'triangle';
            
            // 缓慢起音，悠长衰减
            mainGain.gain.setValueAtTime(0, now);
            mainGain.gain.linearRampToValueAtTime(audioVolume * 0.5, now + 0.3);
            mainGain.gain.exponentialRampToValueAtTime(audioVolume * 0.3, now + duration * 0.4);
            mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            mainOsc.start(now);
            mainOsc.stop(now + duration);
            
            // 泛音 - 增加通透感
            const harmonicOsc = audioContext.createOscillator();
            const harmonicGain = audioContext.createGain();
            harmonicOsc.connect(harmonicGain);
            harmonicGain.connect(audioContext.destination);
            
            harmonicOsc.frequency.value = frequency * 2;
            harmonicOsc.type = 'sine';
            
            harmonicGain.gain.setValueAtTime(0, now);
            harmonicGain.gain.linearRampToValueAtTime(audioVolume * 0.15, now + 0.2);
            harmonicGain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.6);
            
            harmonicOsc.start(now);
            harmonicOsc.stop(now + duration * 0.6);
            
            // 低频基音 - 增加浑厚感
            const bassOsc = audioContext.createOscillator();
            const bassGain = audioContext.createGain();
            bassOsc.connect(bassGain);
            bassGain.connect(audioContext.destination);
            
            bassOsc.frequency.value = frequency * 0.5;
            bassOsc.type = 'sine';
            
            bassGain.gain.setValueAtTime(0, now);
            bassGain.gain.linearRampToValueAtTime(audioVolume * 0.25, now + 0.4);
            bassGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            bassOsc.start(now);
            bassOsc.stop(now + duration);
        }

        // 开始 - 三声磬声
        function playStartSound() {
            if (!audioEnabled || !audioContext) return;
            playBellSound(396, 4); // 低沉浑厚
            setTimeout(() => playBellSound(396, 4), 1200);
            setTimeout(() => playBellSound(396, 5), 2400);
        }

        // 结束 - 一声磬声
        function playEndSound() {
            if (!audioEnabled || !audioContext) return;
            playBellSound(528, 6);
        }

        // 风铃声 - 轻盈通透
        function playChimeSound() {
            if (!audioEnabled || !audioContext) return;
            
            const now = audioContext.currentTime;
            const baseFreq = 528;
            
            // 多音叠加营造风铃效果
            const frequencies = [baseFreq, baseFreq * 1.5, baseFreq * 2, baseFreq * 2.5];
            const delays = [0, 0.1, 0.2, 0.3];
            
            frequencies.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0, now + delays[i]);
                gain.gain.linearRampToValueAtTime(audioVolume * 0.2, now + delays[i] + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + delays[i] + 1.5);
                
                osc.start(now + delays[i]);
                osc.stop(now + delays[i] + 1.5);
            });
        }

        // 水滴声 - 清脆有穿透力
        function playWaterDropSound() {
            if (!audioEnabled || !audioContext) return;
            
            const now = audioContext.currentTime;
            
            // 主音 - 高频清脆
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(audioVolume * 0.4, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            
            osc.start(now);
            osc.stop(now + 0.15);
            
            // 泛音 - 增加穿透力
            const harmonic = audioContext.createOscillator();
            const harmonicGain = audioContext.createGain();
            harmonic.connect(harmonicGain);
            harmonicGain.connect(audioContext.destination);
            
            harmonic.frequency.setValueAtTime(2400, now);
            harmonic.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            harmonic.type = 'sine';
            
            harmonicGain.gain.setValueAtTime(0, now);
            harmonicGain.gain.linearRampToValueAtTime(audioVolume * 0.15, now + 0.005);
            harmonicGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            
            harmonic.start(now);
            harmonic.stop(now + 0.1);
        }

        // 结束前30秒提醒 - 3秒风铃声
        function playPreEndWarning() {
            if (!audioEnabled || !audioContext) return;
            
            const now = audioContext.currentTime;
            const baseFreq = 528;
            
            // 3秒内连续风铃音
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = baseFreq + (i * 100);
                    osc.type = 'sine';
                    
                    const startTime = audioContext.currentTime;
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(audioVolume * 0.15, startTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.8);
                    
                    osc.start(startTime);
                    osc.stop(startTime + 0.8);
                }, i * 600);
            }
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioControl').textContent = audioEnabled ? '🔔 提示音: 开' : '🔕 提示音: 关';
        }

        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = '你好';
            if (hour < 6) greeting = '夜深了';
            else if (hour < 9) greeting = '早安';
            else if (hour < 12) greeting = '上午好';
            else if (hour < 14) greeting = '午安';
            else if (hour < 18) greeting = '下午好';
            else greeting = '晚上好';
            document.getElementById('greeting').textContent = greeting;
        }

        function selectDuration(duration) {
            settings.duration = duration;
            document.querySelectorAll('.selector:first-of-type .option').forEach((el, i) => {
                el.classList.toggle('active', [3, 5, 10][i] === duration);
            });
            updateBtnSubtext();
        }

        function selectMode(mode) {
            settings.mode = mode;
            document.querySelectorAll('.selector:last-of-type .option').forEach((el, i) => {
                el.classList.toggle('active', ['guided', 'silent'][i] === mode);
            });
            updateBtnSubtext();
        }

        function updateBtnSubtext() {
            const modeText = settings.mode === 'guided' ? '引导' : '自主';
            document.getElementById('btnSubtext').textContent = `${settings.duration}分钟 · ${modeText}`;
        }

        function startPractice() {
            currentPractice.duration = settings.duration;
            currentPractice.mode = settings.mode;
            remainingTime = settings.duration * 60;
            totalTime = remainingTime;
            document.getElementById('practiceDuration').textContent = `${settings.duration}分钟止观`;
            document.getElementById('practiceMode').textContent = settings.mode === 'guided' ? '引导练习' : '自主练习';
            document.getElementById('timer').textContent = formatTime(remainingTime);
            document.getElementById('guideText').style.display = settings.mode === 'guided' ? 'block' : 'none';
            showPage('practice');
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            isPlaying = true;
            currentPractice.startTime = new Date();
            lastMinuteMark = 0;
            preEndWarningPlayed = false;
            
            // 播放开始提示音 - 三声磬声
            playStartSound();
            
            document.getElementById('breathBg').classList.add('breathing');
            document.getElementById('practiceControls').innerHTML = `
                <button class="control-btn pause" onclick="pauseTimer()">暂停</button>
                <button class="control-btn end" onclick="endPractice()">结束</button>
            `;
            
            timer = setInterval(() => {
                remainingTime--;
                document.getElementById('timer').textContent = formatTime(remainingTime);
                const progress = ((totalTime - remainingTime) / totalTime) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${Math.floor(progress)}%`;
                
                updateStageLabel();
                updateGuideText();
                
                // 超过3分钟后，每分钟水滴声
                const elapsedMinutes = Math.floor((totalTime - remainingTime) / 60);
                if (totalTime > 180 && elapsedMinutes > lastMinuteMark && elapsedMinutes >= 3) {
                    playWaterDropSound();
                    lastMinuteMark = elapsedMinutes;
                }
                
                // 结束前30秒提醒
                if (remainingTime === 30 && !preEndWarningPlayed) {
                    playPreEndWarning();
                    preEndWarningPlayed = true;
                }
                
                if (remainingTime <= 0) endPractice();
            }, 1000);
        }

        function pauseTimer() {
            isPlaying = false;
            clearInterval(timer);
            document.getElementById('breathBg').classList.remove('breathing');
            document.getElementById('practiceControls').innerHTML = `
                <button class="control-btn start" onclick="resumeTimer()">继续</button>
                <button class="control-btn end" onclick="endPractice()">结束</button>
            `;
        }

        function resumeTimer() { startTimer(); }

        function updateStageLabel() {
            const elapsed = totalTime - remainingTime;
            const progress = elapsed / totalTime;
            let label = '准备开始', stageKey = '';
            if (progress > 0) {
                if (progress < 0.17) { label = '调身'; stageKey = 'tiaoshen'; }
                else if (progress < 0.67) { label = '调息'; stageKey = 'tiaoxi'; }
                else if (progress < 0.89) { label = '观心'; stageKey = 'guanxin'; }
                else { label = '收功'; stageKey = 'shougong'; }
            }
            document.getElementById('stageLabel').textContent = label;
            return stageKey;
        }

        function updateGuideText() {
            if (currentPractice.mode !== 'guided') return;
            const elapsed = totalTime - remainingTime;
            const progress = elapsed / totalTime;
            let text = '';
            if (progress < 0.17) text = '让身体自然放松，脊柱轻轻挺直';
            else if (progress < 0.67) text = '吸气...呼气...保持自然的呼吸节奏';
            else if (progress < 0.89) text = '觉察身体的感觉，不评判，只是知道';
            else text = '慢慢把觉知带回，准备结束练习';
            document.getElementById('guideText').textContent = text;
        }

        function endPractice() {
            clearInterval(timer);
            isPlaying = false;
            
            // 播放结束提示音 - 一声磬声
            playEndSound();
            
            const actualDuration = Math.floor((new Date() - currentPractice.startTime) / 1000 / 60);
            document.getElementById('completionTime').textContent = `实际练习 ${actualDuration < 1 ? 1 : actualDuration} 分钟`;
            showPage('completion');
        }

        function goBack() {
            if (isPlaying) {
                if (confirm('练习正在进行中，确定要退出吗？')) {
                    clearInterval(timer);
                    showPage('home');
                }
            } else showPage('home');
        }

        function setRating(rating) {
            currentPractice.rating = rating;
            document.querySelectorAll('#ratingStars .star').forEach((el, i) => {
                el.classList.toggle('active', i < rating);
            });
        }

        function savePractice() {
            currentPractice.notes = document.getElementById('practiceNotes').value;
            const record = {
                id: Date.now(),
                date: new Date().toISOString(),
                duration: currentPractice.duration,
                mode: currentPractice.mode,
                rating: currentPractice.rating,
                notes: currentPractice.notes
            };
            practiceHistory.unshift(record);
            localStorage.setItem('zhiguan_history', JSON.stringify(practiceHistory));
            currentPractice.rating = 0;
            currentPractice.notes = '';
            document.getElementById('practiceNotes').value = '';
            document.querySelectorAll('#ratingStars .star').forEach(el => el.classList.remove('active'));
            updateHomeStats();
            updateStatsPage();
            showPage('stats');
        }

        function updateHomeStats() {
            const today = new Date().toDateString();
            const todayCount = practiceHistory.filter(r => new Date(r.date).toDateString() === today).length;
            const streak = calculateStreak();
            const totalMinutes = Math.floor(practiceHistory.reduce((sum, r) => sum + r.duration, 0));
            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('streak').textContent = streak;
            document.getElementById('totalMinutes').textContent = totalMinutes;
        }

        function calculateStreak() {
            if (practiceHistory.length === 0) return 0;
            const dates = [...new Set(practiceHistory.map(r => new Date(r.date).toDateString()))]
                .sort((a, b) => new Date(b) - new Date(a));
            let streak = 0;
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (dates[0] === today || dates[0] === yesterday) {
                streak = 1;
                for (let i = 1; i < dates.length; i++) {
                    const prev = new Date(dates[i - 1]);
                    const curr = new Date(dates[i]);
                    if ((prev - curr) / 86400000 === 1) streak++;
                    else break;
                }
            }
            return streak;
        }

        function updateStatsPage() {
            const totalSessions = practiceHistory.length;
            const totalHours = Math.floor(practiceHistory.reduce((sum, r) => sum + r.duration, 0) / 60 * 10) / 10;
            const streak = calculateStreak();
            document.getElementById('totalSessions').textContent = totalSessions;
            document.getElementById('totalHours').textContent = totalHours;
            document.getElementById('currentStreak').textContent = streak;
            const historyList = document.getElementById('historyList');
            if (practiceHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🧘</div>
                        <div class="empty-text">还没有练习记录</div>
                        <div class="empty-subtext">开始你的第一次止观练习吧</div>
                    </div>`;
                return;
            }
            historyList.innerHTML = practiceHistory.slice(0, 20).map(record => {
                const date = new Date(record.date);
                const stars = '★'.repeat(record.rating || 0) + '☆'.repeat(5 - (record.rating || 0));
                return `
                    <div class="history-item">
                        <div class="history-main">
                            <div class="history-date">
                                <div class="date-day">${date.getDate()}</div>
                                <div class="date-month">${date.getMonth() + 1}月</div>
                            </div>
                            <div class="history-info">
                                <div class="history-duration">${record.duration}分钟止观</div>
                                <div class="history-mode">${record.mode === 'guided' ? '引导练习' : '自主练习'}</div>
                            </div>
                            <div class="history-rating">${stars}</div>
                        </div>
                        ${record.notes ? `<div class="history-notes">${record.notes}</div>` : ''}
                    </div>`;
            }).join('');
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            if (page === 'home') {
                document.getElementById('homePage').classList.add('active');
                document.getElementById('tabHome').classList.add('active');
                updateHomeStats();
            } else if (page === 'practice') {
                document.getElementById('practicePage').classList.add('active');
            } else if (page === 'completion') {
                document.getElementById('completionPage').classList.add('active');
            } else if (page === 'stats') {
                document.getElementById('statsPage').classList.add('active');
                document.getElementById('tabStats').classList.add('active');
                updateStatsPage();
            }
        }
    </script>
</body>
</html>
