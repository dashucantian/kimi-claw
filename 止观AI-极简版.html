<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>止观AI</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;color:#fff}.container{max-width:480px;margin:0 auto;padding:20px}.page{display:none}.page.active{display:block}.header{text-align:center;margin-bottom:30px;padding-top:20px}.greeting{font-size:28px;font-weight:600;margin-bottom:8px}.subtitle{font-size:14px;color:rgba(255,255,255,0.6)}.main-btn{background:linear-gradient(135deg,#4a9eff 0%,#357abd 100%);border-radius:50%;width:160px;height:160px;margin:40px auto;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;border:none;color:#fff;box-shadow:0 10px 40px rgba(74,158,255,0.3);touch-action:manipulation}.main-btn:active{transform:scale(0.95)}.main-btn-text{font-size:20px;font-weight:600}.main-btn-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:6px}.selector{margin-bottom:25px}.selector-label{display:block;font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:12px}.options{display:flex;gap:10px}.option{flex:1;background:rgba(255,255,255,0.05);border-radius:12px;padding:15px 10px;text-align:center;border:2px solid transparent;cursor:pointer;touch-action:manipulation}.option.active{background:rgba(74,158,255,0.15);border-color:#4a9eff}.option-num{display:block;font-size:24px;font-weight:600}.option-unit{font-size:11px;color:rgba(255,255,255,0.5)}.timer{font-size:72px;font-weight:200;text-align:center;margin:80px 0 20px;letter-spacing:4px;font-family:monospace}.stage{text-align:center;font-size:18px;color:rgba(255,255,255,0.5);margin-bottom:30px}.progress{width:100%;max-width:320px;margin:0 auto;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,#4a9eff,#357abd);width:0%;transition:width .5s linear}.controls{display:flex;justify-content:center;gap:20px;margin-top:50px}.btn{padding:15px 40px;border-radius:25px;border:none;font-size:16px;cursor:pointer;touch-action:manipulation}.btn:active{transform:scale(0.95)}.btn-start{background:linear-gradient(135deg,#4a9eff 0%,#357abd 100%);color:#fff}.btn-pause{background:#ffc107;color:#000}.btn-end{background:#f44336;color:#fff}.tab-bar{display:flex;justify-content:space-around;padding:15px 0;background:rgba(255,255,255,0.05);border-radius:20px;margin-top:30px;position:fixed;bottom:20px;left:20px;right:20px;max-width:440px;margin-left:auto;margin-right:auto}.tab{text-align:center;cursor:pointer;padding:10px 40px;border-radius:12px;touch-action:manipulation}.tab.active{background:rgba(74,158,255,0.2)}.back{color:rgba(255,255,255,0.6);cursor:pointer;margin-bottom:20px;display:inline-block;padding:10px;touch-action:manipulation}</style></head><body><div class="container"><div id="home" class="page active"><div class="header"><div class="greeting" id="greeting">你好</div><div class="subtitle">每日止观，回归当下</div></div><button class="main-btn" onclick="goPractice()"><span class="main-btn-text">开始止观</span><span class="main-btn-sub" id="btnText">3分钟</span></button><div class="selector"><span class="selector-label">选择时长</span><div class="options"><div class="option active" onclick="setD(3,this)"><span class="option-num">3</span><span class="option-unit">分钟</span></div><div class="option" onclick="setD(5,this)"><span class="option-num">5</span><span class="option-unit">分钟</span></div><div class="option" onclick="setD(10,this)"><span class="option-num">10</span><span class="option-unit">分钟</span></div></div></div><div class="tab-bar"><div class="tab active" onclick="show('home')">练习</div><div class="tab" onclick="show('stats')">记录</div></div></div><div id="practice" class="page"><span class="back" onclick="back()">← 返回</span><div class="timer" id="timer">03:00</div><div class="stage" id="stage">准备开始</div><div class="progress"><div class="progress-bar" id="progressBar"></div></div><div class="controls" id="controls"><button class="btn btn-start" onclick="start()">开始练习</button></div></div><div id="stats" class="page"><div class="header"><div class="greeting">修行记录</div></div><div id="historyList" style="margin-bottom:100px"></div><div class="tab-bar"><div class="tab" onclick="show('home')">练习</div><div class="tab active" onclick="show('stats')">记录</div></div></div></div><script>var d=3,t=180,total=180,timer=null,history=JSON.parse(localStorage.getItem('zh')||'[]');function setGreeting(){var h=new Date().getHours(),g='你好';if(h<6)g='夜深了';else if(h<9)g='早安';else if(h<12)g='上午好';else if(h<14)g='午安';else if(h<18)g='下午好';else g='晚上好';document.getElementById('greeting').textContent=g}function setD(v,el){d=v;document.querySelectorAll('.option').forEach(function(e){e.classList.remove('active')});el.classList.add('active');document.getElementById('btnText').textContent=d+'分钟'}function format(s){var m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec}function show(p){document.querySelectorAll('.page').forEach(function(e){e.classList.remove('active')});document.getElementById(p).classList.add('active');if(p==='stats')renderHistory()}function goPractice(){t=d*60;total=t;document.getElementById('timer').textContent=format(t);document.getElementById('controls').innerHTML='<button class="btn btn-start" onclick="start()">开始练习</button>';show('practice')}function start(){document.getElementById('controls').innerHTML='<button class="btn btn-pause" onclick="pause()">暂停</button><button class="btn btn-end" onclick="end()">结束</button>';timer=setInterval(function(){t--;document.getElementById('timer').textContent=format(t);var p=((total-t)/total)*100;document.getElementById('progressBar').style.width=p+'%';updateStage();if(t<=0)end()},1000)}function pause(){clearInterval(timer);document.getElementById('controls').innerHTML='<button class="btn btn-start" onclick="resume()">继续</button><button class="btn btn-end" onclick="end()">结束</button>'}function resume(){start()}function updateStage(){var p=(total-t)/total,s='准备开始';if(p>0){if(p<.17)s='调身';else if(p<.67)s='调息';else if(p<.89)s='观心';else s='收功'}document.getElementById('stage').textContent=s}function end(){clearInterval(timer);var record={date:new Date().toISOString(),duration:d};history.unshift(record);localStorage.setItem('zh',JSON.stringify(history));show('stats')}function back(){if(confirm('确定退出？')){clearInterval(timer);show('home')}}function renderHistory(){var c=document.getElementById('historyList');if(history.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5)">暂无记录</div>';return}c.innerHTML=history.slice(0,20).map(function(r){var d=new Date(r.date);return'<div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:15px;margin-bottom:10px"><div style="font-size:18px">'+r.duration+'分钟止观</div><div style="font-size:12px;color:rgba(255,255,255,0.5)">'+(d.getMonth()+1)+'月'+d.getDate()+'日</div></div>'}).join('')}setGreeting()</script></body></html>
