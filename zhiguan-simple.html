<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;color:#fff}
        .container{max-width:480px;margin:0 auto;padding:20px}
        .page{display:none}
        .page.active{display:block}
        .header{text-align:center;margin-bottom:30px}
        .greeting{font-size:28px;font-weight:600;margin-bottom:8px}
        .subtitle{font-size:14px;color:rgba(255,255,255,0.6)}
        .main-btn{background:linear-gradient(135deg,#4a9eff 0%,#357abd 100%);border-radius:50%;width:160px;height:160px;margin:40px auto;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;border:none;color:#fff;box-shadow:0 10px 40px rgba(74,158,255,0.3)}
        .main-btn-text{font-size:20px;font-weight:600}
        .main-btn-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:6px}
        .selector{margin-bottom:20px}
        .selector-label{display:block;font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:12px}
        .options{display:flex;gap:10px}
        .option{flex:1;background:rgba(255,255,255,0.05);border-radius:12px;padding:15px 10px;text-align:center;border:2px solid transparent;cursor:pointer}
        .option.active{background:rgba(74,158,255,0.15);border-color:#4a9eff}
        .option-num{display:block;font-size:24px;font-weight:600}
        .option-unit{font-size:11px;color:rgba(255,255,255,0.5)}
        .timer{font-size:72px;font-weight:200;text-align:center;margin:60px 0 20px;letter-spacing:4px}
        .stage{text-align:center;font-size:16px;color:rgba(255,255,255,0.5);margin-bottom:30px}
        .guide{max-width:320px;margin:0 auto 30px;padding:20px;background:rgba(255,255,255,0.05);border-radius:16px;text-align:center;line-height:1.6}
        .progress{width:100%;max-width:320px;margin:0 auto;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
        .progress-bar{height:100%;background:linear-gradient(90deg,#4a9eff,#357abd);width:0%;transition:width 1s linear}
        .controls{display:flex;justify-content:center;gap:20px;margin-top:40px}
        .btn{padding:15px 40px;border-radius:25px;border:none;font-size:16px;cursor:pointer}
        .btn-start{background:linear-gradient(135deg,#4a9eff 0%,#357abd 100%);color:#fff}
        .btn-pause{background:rgba(255,193,7,0.9);color:#000}
        .btn-end{background:rgba(244,67,54,0.9);color:#fff}
        .btn-save{background:linear-gradient(135deg,#4caf50 0%,#388e3c 100%);color:#fff}
        .stars{display:flex;justify-content:center;gap:10px;margin:20px 0}
        .star{font-size:36px;color:rgba(255,255,255,0.2);cursor:pointer}
        .star.active{color:#ffc107}
        .notes{width:100%;max-width:320px;height:100px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:15px;color:#fff;margin:20px auto;display:block}
        .tab-bar{display:flex;justify-content:space-around;padding:15px 0;background:rgba(255,255,255,0.05);border-radius:20px;margin-top:20px}
        .tab{text-align:center;cursor:pointer;padding:10px 40px}
        .tab.active{background:rgba(74,158,255,0.2);border-radius:12px}
        .history-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:15px;margin-bottom:10px}
        .back{color:rgba(255,255,255,0.6);cursor:pointer;margin-bottom:20px;display:inline-block}
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="home" class="page active">
            <div class="header">
                <div class="greeting" id="greeting">你好</div>
                <div class="subtitle">每日止观，回归当下</div>
            </div>
            <button class="main-btn" onclick="start()">
                <span class="main-btn-text">开始止观</span>
                <span class="main-btn-sub" id="btnText">3分钟 · 引导</span>
            </button>
            <div class="selector">
                <span class="selector-label">选择时长</span>
                <div class="options">
                    <div class="option active" onclick="setDuration(3,this)"><span class="option-num">3</span><span class="option-unit">分钟</span></div>
                    <div class="option" onclick="setDuration(5,this)"><span class="option-num">5</span><span class="option-unit">分钟</span></div>
                    <div class="option" onclick="setDuration(10,this)"><span class="option-num">10</span><span class="option-unit">分钟</span></div>
                </div>
            </div>
            <div class="selector">
                <span class="selector-label">练习模式</span>
                <div class="options">
                    <div class="option active" onclick="setMode('guided',this)"><span class="option-num">引导</span><span class="option-unit">适合初学</span></div>
                    <div class="option" onclick="setMode('silent',this)"><span class="option-num">自主</span><span class="option-unit">适合熟练</span></div>
                </div>
            </div>
            <div class="tab-bar">
                <div class="tab active" onclick="show('home')">练习</div>
                <div class="tab" onclick="show('stats')">记录</div>
            </div>
        </div>

        <!-- 练习页 -->
        <div id="practice" class="page">
            <span class="back" onclick="back()">← 返回</span>
            <div class="timer" id="timer">03:00</div>
            <div class="stage" id="stage">准备开始</div>
            <div class="guide" id="guide" style="display:none">让身体自然放松</div>
            <div class="progress"><div class="progress-bar" id="progress"></div></div>
            <div class="controls" id="controls">
                <button class="btn btn-start" onclick="begin()">开始</button>
            </div>
        </div>

        <!-- 完成页 -->
        <div id="done" class="page" style="text-align:center;padding-top:60px">
            <div class="greeting">练习完成</div>
            <div class="subtitle" id="doneTime">实际练习 3 分钟</div>
            <div class="stars" id="stars">
                <span class="star" onclick="rate(1)">★</span>
                <span class="star" onclick="rate(2)">★</span>
                <span class="star" onclick="rate(3)">★</span>
                <span class="star" onclick="rate(4)">★</span>
                <span class="star" onclick="rate(5)">★</span>
            </div>
            <textarea class="notes" id="notes" placeholder="记录感受（可选）"></textarea>
            <button class="btn btn-save" onclick="save()">保存</button>
        </div>

        <!-- 统计页 -->
        <div id="stats" class="page">
            <div class="header">
                <div class="greeting">修行记录</div>
            </div>
            <div id="history"></div>
            <div class="tab-bar">
                <div class="tab" onclick="show('home')">练习</div>
                <div class="tab active" onclick="show('stats')">记录</div>
            </div>
        </div>
    </div>

    <script>
        let cfg={duration:3,mode:'guided'},time=180,total=180,timer=null,history=JSON.parse(localStorage.getItem('zhiguan')||'[]'),rating=0,startTime=null;
        function setGreeting(){const h=new Date().getHours();let g='你好';if(h<6)g='夜深了';else if(h<9)g='早安';else if(h<12)g='上午好';else if(h<14)g='午安';else if(h<18)g='下午好';else g='晚上好';document.getElementById('greeting').textContent=g}
        function setDuration(d,el){cfg.duration=d;document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));el.classList.add('active');updateBtn()}
        function setMode(m,el){cfg.mode=m;document.querySelectorAll('.option').forEach((o,i)=>{if(i>=3)o.classList.remove('active')});el.classList.add('active');updateBtn()}
        function updateBtn(){document.getElementById('btnText').textContent=`${cfg.duration}分钟 · ${cfg.mode==='guided'?'引导':'自主'}`}
        function start(){time=cfg.duration*60;total=time;document.getElementById('timer').textContent=format(time);document.getElementById('guide').style.display=cfg.mode==='guided'?'block':'none';show('practice')}
        function format(s){const m=Math.floor(s/60),sec=s%60;return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
        function begin(){startTime=new Date();document.getElementById('controls').innerHTML='<button class="btn btn-pause" onclick="pause()">暂停</button><button class="btn btn-end" onclick="end()">结束</button>';timer=setInterval(()=>{time--;document.getElementById('timer').textContent=format(time);const p=((total-time)/total)*100;document.getElementById('progress').style.width=`${p}%`;updateStage();if(time<=0)end()},1000)}
        function pause(){clearInterval(timer);document.getElementById('controls').innerHTML='<button class="btn btn-start" onclick="resume()">继续</button><button class="btn btn-end" onclick="end()">结束</button>'}
        function resume(){begin()}
        function updateStage(){const p=(total-time)/total;let s='准备开始';if(p>0){if(p<0.17)s='调身';else if(p<0.67)s='调息';else if(p<0.89)s='观心';else s='收功'}document.getElementById('stage').textContent=s;if(cfg.mode==='guided'){let g='让身体自然放松';if(p>=0.17&&p<0.67)g='吸气...呼气...保持自然呼吸';else if(p>=0.67&&p<0.89)g='觉察身体感觉，不评判';else if(p>=0.89)g='慢慢把觉知带回';document.getElementById('guide').textContent=g}}
        function end(){clearInterval(timer);const actual=Math.floor((new Date()-startTime)/60000);document.getElementById('doneTime').textContent=`实际练习 ${actual<1?1:actual} 分钟`;show('done')}
        function back(){if(confirm('确定退出练习？')){clearInterval(timer);show('home')}}
        function rate(n){rating=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n))}
        function save(){const record={date:new Date().toISOString(),duration:cfg.duration,mode:cfg.mode,rating:rating,notes:document.getElementById('notes').value};history.unshift(record);localStorage.setItem('zhiguan',JSON.stringify(history));rating=0;document.getElementById('notes').value='';document.querySelectorAll('.star').forEach(s=>s.classList.remove('active'));updateStats();show('stats')}
        function updateStats(){const h=document.getElementById('history');if(history.length===0){h.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5)">暂无记录</div>';return}h.innerHTML=history.map(r=>{const d=new Date(r.date);const stars='★'.repeat(r.rating)+'☆'.repeat(5-r.rating);return `<div class="history-item"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:18px">${r.duration}分钟止观</div><div style="font-size:12px;color:rgba(255,255,255,0.5)">${d.getMonth()+1}月${d.getDate()}日 · ${r.mode==='guided'?'引导':'自主'}</div></div><div style="color:#ffc107">${stars}</div></div>${r.notes?`<div style="margin-top:10px;font-size:14px;color:rgba(255,255,255,0.7)">${r.notes}</div>`:''}</div>`}).join('')}
        function show(p){document.querySelectorAll('.page').forEach(page=>page.classList.remove('active'));document.getElementById(p).classList.add('active');if(p==='stats')updateStats()}
        setGreeting();
    </script>
</body>
</html>
