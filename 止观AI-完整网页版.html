<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观AI - 禅修助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-item.active {
            color: #4a9eff;
            background: rgba(74, 158, 255, 0.1);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .nav-item span {
            font-size: 12px;
        }

        /* 页面 */
        .page {
            display: none;
            padding: 20px;
            min-height: calc(100vh - 80px);
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页 */
        .home-header {
            text-align: center;
            padding: 30px 0;
        }

        .greeting {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #4a9eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub-greeting {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #4a9eff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .breath-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
        }

        .breath-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.3) 0%, rgba(74, 158, 255, 0.1) 100%);
            border: 2px solid rgba(74, 158, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            animation: breathe 4s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .breath-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(74, 158, 255, 0.3);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(74, 158, 255, 0.2); }
            50% { transform: scale(1.08); box-shadow: 0 0 40px rgba(74, 158, 255, 0.4); }
        }

        .breath-btn svg {
            width: 48px;
            height: 48px;
            color: #4a9eff;
            margin-bottom: 8px;
        }

        .breath-text {
            font-size: 16px;
            color: #4a9eff;
            font-weight: 500;
        }

        .options-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .option-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .duration-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .duration-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .duration-btn.active {
            background: rgba(74, 158, 255, 0.2);
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .mode-options {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn.active {
            background: rgba(74, 158, 255, 0.2);
            border-color: #4a9eff;
            color: #4a9eff;
        }

        /* 练习页 */
        .practice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mute-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .mute-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .practice-title {
            font-size: 18px;
            font-weight: 500;
        }

        .timer-display {
            text-align: center;
            margin: 40px 0;
        }

        .timer-circle {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            position: relative;
        }

        .timer-svg {
            transform: rotate(-90deg);
        }

        .timer-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 4;
        }

        .timer-progress {
            fill: none;
            stroke: #4a9eff;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .phase-indicator {
            text-align: center;
            margin: 30px 0;
        }

        .phase-tag {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        .phase-guide {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
            min-height: 60px;
        }

        .practice-controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.4);
        }

        .control-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(74, 158, 255, 0.5);
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .control-btn svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        /* 完成页 */
        .complete-header {
            text-align: center;
            padding: 40px 0;
        }

        .complete-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.3) 0%, rgba(74, 158, 255, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: completePulse 0.6s ease;
        }

        @keyframes completePulse {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .complete-icon svg {
            width: 50px;
            height: 50px;
            color: #4a9eff;
        }

        .complete-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .complete-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .rating-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }

        .section-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .star-rating {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .star {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .star.active {
            color: #ffd700;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .feedback-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .feedback-tag {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feedback-tag.selected {
            background: rgba(74, 158, 255, 0.3);
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .note-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            resize: none;
            margin-top: 15px;
            font-family: inherit;
        }

        .note-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .note-input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .complete-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
            color: #fff;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.4);
        }

        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 记录页 */
        .records-header {
            padding: 20px 0;
        }

        .records-title {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .records-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 600;
            color: #4a9eff;
        }

        .stat-card-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .calendar-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-month {
            font-size: 16px;
            font-weight: 500;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .calendar-nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            position: relative;
        }

        .calendar-day.other-month {
            color: rgba(255, 255, 255, 0.2);
        }

        .calendar-day.today {
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            font-weight: 500;
        }

        .calendar-day.practiced::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: #4a9eff;
            border-radius: 50%;
        }

        .recent-records {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
        }

        .record-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-icon {
            width: 40px;
            height: 40px;
            background: rgba(74, 158, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .record-icon svg {
            width: 20px;
            height: 20px;
            color: #4a9eff;
        }

        .record-info {
            flex: 1;
        }

        .record-date {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .record-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .record-rating {
            color: #ffd700;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 呼吸动画背景 */
        .breath-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .breath-bg.active {
            opacity: 1;
        }

        .breath-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 158, 255, 0.1) 0%, transparent 70%);
            animation: breathBg 8s ease-in-out infinite;
        }

        .breath-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .breath-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 10%;
            animation-delay: -2s;
        }

        .breath-circle:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 30%;
            animation-delay: -4s;
        }

        @keyframes breathBg {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        /* 阶段进度条 */
        .phase-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .phase-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
        }

        .phase-dot.active {
            background: #4a9eff;
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .phase-dot.completed {
            background: rgba(74, 158, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="breath-bg" id="breathBg">
        <div class="breath-circle"></div>
        <div class="breath-circle"></div>
        <div class="breath-circle"></div>
    </div>

    <div class="container">
        <!-- 首页 -->
        <div class="page active" id="homePage">
            <div class="home-header">
                <h1 class="greeting" id="greeting">早安</h1>
                <p class="sub-greeting">开启今日的禅修之旅</p>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="todayCount">0</div>
                    <div class="stat-label">今日练习</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streakDays">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
            </div>

            <div class="breath-container">
                <div class="breath-btn" id="startBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span class="breath-text">开始禅修</span>
                </div>
            </div>

            <div class="options-section">
                <div class="option-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    练习时长
                </div>
                <div class="duration-options">
                    <button class="duration-btn active" data-duration="3">3分钟</button>
                    <button class="duration-btn" data-duration="5">5分钟</button>
                    <button class="duration-btn" data-duration="15">15分钟</button>
                </div>

                <div class="option-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    练习模式
                </div>
                <div class="mode-options">
                    <button class="mode-btn active" data-mode="guided">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="22"/>
                        </svg>
                        引导模式
                    </button>
                    <button class="mode-btn" data-mode="free">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        自主模式
                    </button>
                </div>
            </div>
        </div>

        <!-- 练习页 -->
        <div class="page" id="practicePage">
            <div class="practice-header">
                <button class="back-btn" id="practiceBackBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <span class="practice-title">禅修中</span>
                <button class="mute-btn" id="muteBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="soundOnIcon">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>

    <script>
        // ==================== 音效系统 ====================
        class SoundEngine {
            constructor() {
                this.audioContext = null;
                this.isMuted = false;
                this.intervals = [];
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
            }

            // 大磬声 - 开场
            playBigBell() {
                if (this.isMuted) return;
                this.init();
                
                const t = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(180, t);
                osc.frequency.exponentialRampToValueAtTime(150, t + 0.5);
                
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 3);
                
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.start(t);
                osc.stop(t + 3);
            }

            // 水滴声 - 止息阶段
            playWaterDrop() {
                if (this.isMuted) return;
                this.init();
                
                const t = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(400, t + 0.3);
                
                gain.gain.setValueAtTime(0.08, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.start(t);
                osc.stop(t + 0.5);
            }

            // 风铃声 - 观心阶段
            playWindChime() {
                if (this.isMuted) return;
                this.init();
                
                const t = this.audioContext.currentTime;
                const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C大调和弦
                
                frequencies.forEach((freq, i) => {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, t + i * 0.05);
                    
                    gain.gain.setValueAtTime(0.05, t + i * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 2 + i * 0.1);
                    
                    osc.connect(gain);
                    gain.connect(this.audioContext.destination);
                    
                    osc.start(t + i * 0.05);
                    osc.stop(t + 3);
                });
            }

            // 木鱼声 - 收功
            playWoodBlock() {
                if (this.isMuted) return;
                this.init();
                
                const t = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
                
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                
                // 添加滤波器使声音更像木鱼
                const filter = this.audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, t);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.start(t);
                osc.stop(t + 0.3);
            }

            // 引磬声 - 结束
            playSmallBell() {
                if (this.isMuted) return;
                this.init();
                
                const t = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, t);
                osc.frequency.exponentialRampToValueAtTime(1000, t + 0.3);
                
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 2);
                
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.start(t);
                osc.stop(t + 2);
            }

            // 开始水滴声循环
            startWaterDropLoop() {
                const loop = () => {
                    this.playWaterDrop();
                    const nextInterval = 7000 + Math.random() * 2000; // 7-9秒
                    const timeoutId = setTimeout(loop, nextInterval);
                    this.intervals.push(timeoutId);
                };
                loop();
            }

            // 开始风铃声循环
            startWindChimeLoop() {
                const loop = () => {
                    this.playWindChime();
                    const nextInterval = 8000 + Math.random() * 2000; // 8-10秒
                    const timeoutId = setTimeout(loop, nextInterval);
                    this.intervals.push(timeoutId);
                };
                loop();
            }

            // 清除所有定时器
            clearAllIntervals() {
                this.intervals.forEach(id => clearTimeout(id));
                this.intervals = [];
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                return this.isMuted;
            }
        }

        // ==================== 数据存储 ====================
        class DataStore {
            static getRecords() {
                const data = localStorage.getItem('zhiguan_records');
                return data ? JSON.parse(data) : [];
            }

            static saveRecord(record) {
                const records = this.getRecords();
                records.unshift(record);
                localStorage.setItem('zhiguan_records', JSON.stringify(records));
            }

            static getTodayCount() {
                const records = this.getRecords();
                const today = new Date().toDateString();
                return records.filter(r => new Date(r.date).toDateString() === today).length;
            }

            static getStreakDays() {
                const records = this.getRecords();
                if (records.length === 0) return 0;

                const practiceDates = [...new Set(records.map(r => 
                    new Date(r.date).toDateString()
                ))].map(d => new Date(d));

                practiceDates.sort((a, b) => b - a);

                let streak = 0;
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                for (let i = 0; i < practiceDates.length; i++) {
                    const date = new Date(practiceDates[i]);
                    date.setHours(0, 0, 0, 0);
                    
                    const diffDays = Math.floor((today - date) / (1000 * 60 * 60 * 24));
                    
                    if (diffDays === i || (i === 0 && diffDays === 1)) {
                        streak++;
                    } else if (diffDays > i) {
                        break;
                    }
                }

                return streak;
            }

            static getTotalCount() {
                return this.getRecords().length;
            }

            static getTotalHours() {
                const records = this.getRecords();
                const totalMinutes = records.reduce((sum, r) => sum + (r.duration || 0), 0);
                return (totalMinutes / 60).toFixed(1);
            }

            static getMonthCount() {
                const records = this.getRecords();
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                const monthDates = new Set();
                records.forEach(r => {
                    const date = new Date(r.date);
                    if (date.getMonth() === currentMonth && date.getFullYear() === currentYear) {
                        monthDates.add(date.toDateString());
                    }
                });

                return monthDates.size;
            }

            static getPracticedDates(year, month) {
                const records = this.getRecords();
                const dates = new Set();
                
                records.forEach(r => {
                    const date = new Date(r.date);
                    if (date.getFullYear() === year && date.getMonth() === month) {
                        dates.add(date.getDate());
                    }
                });

                return dates;
            }

            static getRecentRecords(limit = 10) {
                return this.getRecords().slice(0, limit);
            }
        }

        // ==================== 应用逻辑 ====================
        class App {
            constructor() {
                this.soundEngine = new SoundEngine();
                this.currentPage = 'home';
                this.selectedDuration = 3;
                this.selectedMode = 'guided';
                this.practiceTimer = null;
                this.remainingTime = 0;
                this.totalTime = 0;
                this.isPaused = false;
                this.currentRating = 0;
                this.selectedTags = [];
                this.currentDate = new Date();

                this.phases = [
                    { name: '调身调息', start: 0, end: 16, guide: '调整坐姿，放松身体，将注意力放在呼吸上...' },
                    { name: '止息', start: 16, end: 90, guide: '保持呼吸自然，让心念逐渐平静...' },
                    { name: '观心', start: 90, end: -15, guide: '观察心念起伏，不评判，不跟随...' },
                    { name: '收功', start: -15, end: 0, guide: '慢慢将意识带回，活动身体...' }
                ];

                this.init();
            }

            init() {
                this.updateGreeting();
                this.updateHomeStats();
                this.bindEvents();
                this.renderCalendar();
                this.renderRecentRecords();
                this.updateRecordsStats();
            }

            updateGreeting() {
                const hour = new Date().getHours();
                let greeting = '早安';
                if (hour >= 12 && hour < 18) greeting = '午安';
                else if (hour >= 18) greeting = '晚安';
                document.getElementById('greeting').textContent = greeting;
            }

            updateHomeStats() {
                document.getElementById('todayCount').textContent = DataStore.getTodayCount();
                document.getElementById('streakDays').textContent = DataStore.getStreakDays();
            }

            updateRecordsStats() {
                document.getElementById('totalCount').textContent = DataStore.getTotalCount();
                document.getElementById('totalHours').textContent = DataStore.getTotalHours();
                document.getElementById('recordStreak').textContent = DataStore.getStreakDays();
                document.getElementById('monthCount').textContent = DataStore.getMonthCount();
            }

            bindEvents() {
                // 导航
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = e.currentTarget.dataset.page;
                        this.switchPage(page);
                    });
                });

                // 时长选择
                document.querySelectorAll('.duration-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.selectedDuration = parseInt(e.target.dataset.duration);
                    });
                });

                // 模式选择
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        this.selectedMode = e.currentTarget.dataset.mode;
                    });
                });

                // 开始禅修
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.startPractice();
                });

                // 练习页控制
                document.getElementById('practiceBackBtn').addEventListener('click', () => {
                    this.endPractice();
                });

                document.getElementById('endBtn').addEventListener('click', () => {
                    this.endPractice();
                });

                document.getElementById('pauseBtn').addEventListener('click', () => {
                    this.togglePause();
                });

                document.getElementById('muteBtn').addEventListener('click', () => {
                    const isMuted = this.soundEngine.toggleMute();
                    document.getElementById('soundOnIcon').style.display = isMuted ? 'none' : 'block';
                    document.getElementById('soundOffIcon').style.display = isMuted ? 'block' : 'none';
                });

                // 完成页
                document.querySelectorAll('.star').forEach(star => {
                    star.addEventListener('click', (e) => {
                        this.currentRating = parseInt(e.target.dataset.rating);
                        this.updateStarDisplay();
                    });
                });

                document.querySelectorAll('.feedback-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const tagValue = e.target.dataset.tag;
                        if (this.selectedTags.includes(tagValue)) {
                            this.selectedTags = this.selectedTags.filter(t => t !== tagValue);
                            e.target.classList.remove('selected');
                        } else {
                            this.selectedTags.push(tagValue);
                            e.target.classList.add('selected');
                        }
                    });
                });

                document.getElementById('saveBtn').addEventListener('click', () => {
                    this.saveRecord();
                });

                document.getElementById('skipBtn').addEventListener('click', () => {
                    this.saveRecord(true);
                });

                // 日历导航
                document.getElementById('prevMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.renderCalendar();
                });

                document.getElementById('nextMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.renderCalendar();
                });
            }

            switchPage(page) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

                document.getElementById(page + 'Page').classList.add('active');
                document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');

                this.currentPage = page;

                if (page === 'records') {
                    this.updateRecordsStats();
                    this.renderCalendar();
                    this.renderRecentRecords();
                }
            }

            startPractice() {
                this.totalTime = this.selectedDuration * 60;
                this.remainingTime = this.totalTime;
                this.isPaused = false;

                this.switchPage('practice');
                document.getElementById('breathBg').classList.add('active');

                // 播放开场音效
                this.soundEngine.playBigBell();

                this.updateTimerDisplay();
                this.updatePhase();

                this.practiceTimer = setInterval(() => {
                    if (!this.isPaused) {
                        this.remainingTime--;
                        this.updateTimerDisplay();
                        this.updatePhase();

                        if (this.remainingTime <= 0) {
                            this.completePractice();
                        }
                    }
                }, 1000);
            }

            updateTimerDisplay() {
                const minutes = Math.floor(this.remainingTime / 60);
                const seconds = this.remainingTime % 60;
                document.getElementById('timerText').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                // 更新进度环
                const progress = (this.totalTime - this.remainingTime) / this.totalTime;
                const circumference = 2 * Math.PI * 100;
                const offset = circumference * progress;
                document.getElementById('timerProgress').style.strokeDashoffset = offset;
            }

            updatePhase() {
                const elapsed = this.totalTime - this.remainingTime;
                const remaining = this.remainingTime;

                let currentPhaseIndex = 0;
                let currentPhase = this.phases[0];

                for (let i = 0; i < this.phases.length; i++) {
                    const phase = this.phases[i];
                    const start = phase.start >= 0 ? phase.start : this.totalTime + phase.start;
                    const end = phase.end > 0 ? phase.end : this.totalTime + phase.end;

                    if (elapsed >= start && elapsed < end) {
                        currentPhase = phase;
                        currentPhaseIndex = i;
                        break;
                    }
                }

                // 更新阶段显示
                document.getElementById('phaseTag').textContent = currentPhase.name;
                if (this.selectedMode === 'guided') {
                    document.getElementById('phaseGuide').textContent = currentPhase.guide;
                } else {
                    document.getElementById('phaseGuide').textContent = '自主练习中...';
                }

                // 更新阶段进度点
                document.querySelectorAll('.phase-dot').forEach((dot, i) => {
                    dot.classList.remove('active', 'completed');
                    if (i < currentPhaseIndex) {
                        dot.classList.add('completed');
                    } else if (i === currentPhaseIndex) {
                        dot.classList.add('active');
                    }
                });

                // 处理音效
                if (this.selectedMode === 'guided') {
                    // 进入止息阶段
                    if (elapsed === 16) {
                        this.soundEngine.clearAllIntervals();
                        this.soundEngine.startWaterDropLoop();
                    }
                    // 进入观心阶段
                    if (elapsed === 90) {
                        this.soundEngine.clearAllIntervals();
                        this.soundEngine.startWindChimeLoop();
                    }
                    // 进入收功阶段
                    if (remaining === 15) {
                        this.soundEngine.clearAllIntervals();
                        this.soundEngine.playWoodBlock();
                    }
                }
            }

            togglePause() {
                this.isPaused = !this.isPaused;
                document.getElementById('pauseIcon').style.display = this.isPaused ? 'none' : 'block';
                document.getElementById('playIcon').style.display = this.isPaused ? 'block' : 'none';
            }

            endPractice() {
                if (confirm('确定要结束本次练习吗？')) {
                    clearInterval(this.practiceTimer);
                    this.soundEngine.clearAllIntervals();
                    document.getElementById('breathBg').classList.remove('active');
                    this.switchPage('home');
                }
            }

            completePractice() {
                clearInterval(this.practiceTimer);
                this.soundEngine.clearAllIntervals();
                this.soundEngine.playSmallBell();

                setTimeout(() => {
                    document.getElementById('breathBg').classList.remove('active');
                    this.resetCompletePage();
                    this.switchPage('complete');
                }, 1000);
            }

            resetCompletePage() {
                this.currentRating = 0;
                this.selectedTags = [];
                this.updateStarDisplay();
                document.querySelectorAll('.feedback-tag').forEach(tag => {
                    tag.classList.remove('selected');
                });
                document.getElementById('noteInput').value = '';
            }

            updateStarDisplay() {
                document.querySelectorAll('.star').forEach((star, i) => {
                    if (i < this.currentRating) {
                        star.classList.add('active');
                    } else {
                        star.classList.remove('active');
                    }
                });
            }

            saveRecord(skipFeedback = false) {
                const record = {
                    date: new Date().toISOString(),
                    duration: this.totalTime / 60,
                    mode: this.selectedMode,
                    rating: skipFeedback ? 0 : this.currentRating,
                    tags: skipFeedback ? [] : this.selectedTags,
                    note: skipFeedback ? '' : document.getElementById('noteInput').value
                };

                DataStore.saveRecord(record);
                this.updateHomeStats();
                this.switchPage('home');
            }

            renderCalendar() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();

                document.getElementById('calendarMonth').textContent = 
                    `${year}年${month + 1}月`;

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const daysInPrevMonth = new Date(year, month, 0).getDate();

                const practicedDates = DataStore.getPracticedDates(year, month);
                const today = new Date();

                let html = '';

                // 星期标题
                const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
                weekDays.forEach(day => {
                    html += `<div class="calendar-day-header">${day}</div>`;
                });

                // 上月日期
                for (let i = firstDay - 1; i >= 0; i--) {
                    html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
                }

                // 当月日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const isToday = year === today.getFullYear() && 
                                   month === today.getMonth() && 
                                   day === today.getDate();
                    const isPracticed = practicedDates.has(day);

                    let classes = 'calendar-day';
                    if (isToday) classes += ' today';
                    if (isPracticed) classes += ' practiced';

                    html += `<div class="${classes}">${day}</div>`;
                }

                // 下月日期
                const remainingCells = (7 - ((firstDay + daysInMonth) % 7)) % 7;
                for (let day = 1; day <= remainingCells; day++) {
                    html += `<div class="calendar-day other-month">${day}</div>`;
                }

                document.getElementById('calendarGrid').innerHTML = html;
            }

            renderRecentRecords() {
                const records = DataStore.getRecentRecords(5);
                const container = document.getElementById('recentRecordsList');

                if (records.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            <p>暂无练习记录</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = records.map(record => {
                    const date = new Date(record.date);
                    const dateStr = `${date.getMonth() + 1}月${date.getDate()}日`;
                    const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                    const stars = record.rating ? '★'.repeat(record.rating) : '';

                    return `
                        <div class="record-item">
                            <div class="record-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 6v6l4 2"/>
                                </svg>
                            </div>
                            <div class="record-info">
                                <div class="record-date">${dateStr} ${timeStr}</div>
                                <div class="record-meta">${record.duration}分钟 · ${record.mode === 'guided' ? '引导模式' : '自主模式'}</div>
                            </div>
                            <div class="record-rating">${stars}</div>
                        </div>
                    `;
                }).join('');
            }
        }

        // 启动应用
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
</html>
